global:
  scrape_interval: 5s
  scrape_timeout: 4s
  evaluation_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: redixis
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8080
