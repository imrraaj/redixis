services:
  auth_redis:
    image: redis:8.4.2-alpine
    container_name: auth_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass "${AUTH_REDIS_PASSWORD:-auth-dev-pass}"
    ports:
      - "6379:6379"
    volumes:
      - auth_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${AUTH_REDIS_PASSWORD:-auth-dev-pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  tenant_redis:
    image: redis:8.4.2-alpine
    container_name: tenant_redis
    restart: unless-stopped
    command: redis-server --save "" --user default off --user redixis on ">${TENANT_REDIS_PASSWORD:-tenant-dev-pass}" "~tenant:*" "+auth" "+client" "+decr" "+del" "+get" "+hello" "+incr" "+mget" "+mset" "+ping" "+select" "+set"
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--user", "redixis", "-a", "${TENANT_REDIS_PASSWORD:-tenant-dev-pass}", "-p", "6379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redixis_api:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: redixis_api
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=${APP_ENV:-development}
      - HTTP_ADDR=0.0.0.0:8080
      - AUTH_REDIS_URL=redis://:${AUTH_REDIS_PASSWORD:-auth-dev-pass}@auth_redis:6379/0?pool_size=20&dial_timeout=1s&read_timeout=1s&write_timeout=1s
      - TENANT_REDIS_URL=redis://redixis:${TENANT_REDIS_PASSWORD:-tenant-dev-pass}@tenant_redis:6379/0?pool_size=50&dial_timeout=1s&read_timeout=1s&write_timeout=1s
      - REDIS_OPERATION_TIMEOUT=1s
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-120}
    depends_on:
      - auth_redis
      - tenant_redis
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: redixis_prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  grafana:
    image: grafana/grafana:11.3.0
    container_name: redixis_grafana
    restart: unless-stopped
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=password
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/dashboard.json
    depends_on:
      - prometheus

volumes:
  auth_data:
  tenant_data:
  grafana_data:
  prometheus_data:
