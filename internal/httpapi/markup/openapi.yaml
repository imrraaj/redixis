openapi: 3.0.3
info:
  title: Redixis API
  version: 0.1.0
  description: Multi-tenant Redis gateway API with account-scoped API keys and command allow-listing.
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Health
  - name: Accounts
  - name: Tenant Commands
paths:
  /healthz:
    get:
      tags:
        - Health
      summary: Liveness check
      responses:
        "200":
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /readyz:
    get:
      tags:
        - Health
      summary: Readiness check
      description: Checks both auth Redis and tenant Redis.
      responses:
        "200":
          description: Service dependencies are ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          $ref: "#/components/responses/Error"
  /auth/account:
    post:
      tags:
        - Accounts
      summary: Create a tenant and API key
      description: Allocates a tenant ID and returns the API key once.
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAccountResponse"
        "500":
          $ref: "#/components/responses/Error"
  /v1/{tenant_id}/{command}:
    post:
      tags:
        - Tenant Commands
      summary: Execute an allowed tenant Redis command
      description: >
        Executes one of GET, SET, DEL, INCR, DECR, MGET, or MSET against keys scoped to the tenant.
        The request body depends on the selected command.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
            pattern: "^[A-Za-z0-9]{12,32}$"
          example: Ab12Cd34Ef56Gh78
        - name: command
          in: path
          required: true
          schema:
            type: string
            enum:
              - GET
              - SET
              - DEL
              - INCR
              - DECR
              - MGET
              - MSET
          example: SET
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/KeyRequest"
                - $ref: "#/components/schemas/SetRequest"
                - $ref: "#/components/schemas/KeysRequest"
                - $ref: "#/components/schemas/MSetRequest"
            examples:
              GET:
                value:
                  key: hello
              SET:
                value:
                  key: hello
                  value: world
                  ttl_seconds: 60
              DEL:
                value:
                  keys:
                    - hello
                    - counter
              MSET:
                value:
                  items:
                    a: "1"
                    b: "2"
      responses:
        "200":
          description: Command result
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ValueResponse"
                  - $ref: "#/components/schemas/StatusResponse"
                  - $ref: "#/components/schemas/DeleteResponse"
                  - $ref: "#/components/schemas/MGetResponse"
        "400":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: bad_request
        message:
          type: string
          example: invalid request
      required:
        - error
        - message
    CreateAccountResponse:
      type: object
      properties:
        tenant_id:
          type: string
          example: Ab12Cd34Ef56Gh78
        api_key:
          type: string
          example: Xy12Ab34Cd56Ef78Gh90Ij12Kl34Mn56Op78Qr90
      required:
        - tenant_id
        - api_key
    KeyRequest:
      type: object
      properties:
        key:
          type: string
          minLength: 1
          maxLength: 512
      required:
        - key
    SetRequest:
      type: object
      properties:
        key:
          type: string
          minLength: 1
          maxLength: 512
        value:
          description: JSON value stored as a string or compact JSON payload.
        ttl_seconds:
          type: integer
          minimum: 0
          default: 0
      required:
        - key
        - value
    KeysRequest:
      type: object
      properties:
        keys:
          type: array
          minItems: 1
          items:
            type: string
      required:
        - keys
    MSetRequest:
      type: object
      properties:
        items:
          type: object
          minProperties: 1
          additionalProperties: true
      required:
        - items
    ValueResponse:
      type: object
      properties:
        value:
          oneOf:
            - type: string
            - type: integer
      required:
        - value
    StatusResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
      required:
        - status
    DeleteResponse:
      type: object
      properties:
        deleted:
          type: integer
          format: int64
          example: 2
      required:
        - deleted
    MGetResponse:
      type: object
      properties:
        values:
          type: array
          items: {}
      required:
        - values
